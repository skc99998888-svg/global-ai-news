name: Global AI News Daily Pipeline

on:
  schedule:
    # 北京时间 08:10 (UTC 00:10)
    - cron: "10 0 * * *"
    # 北京时间 20:30 (UTC 12:30)
    - cron: "30 12 * * *"

  workflow_dispatch:
    inputs:
      date:
        description: "Pipeline date (YYYY-MM-DD). Leave empty for Asia/Shanghai today."
        required: false
        type: string
      ai_limit:
        description: "AI processing limit"
        required: false
        default: "30"
        type: string
      daily_limit:
        description: "Daily report news limit"
        required: false
        default: "20"
        type: string

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
      AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
      AI_MODEL: ${{ secrets.AI_MODEL }}
      AI_API_KEY: ${{ secrets.AI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Set pipeline date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "PIPELINE_DATE=${{ github.event.inputs.date }}" >> $GITHUB_ENV
          else
            echo "PIPELINE_DATE=$(TZ=Asia/Shanghai date +%F)" >> $GITHUB_ENV
          fi
          echo "AI_LIMIT=${{ github.event.inputs.ai_limit || '30' }}" >> $GITHUB_ENV
          echo "DAILY_LIMIT=${{ github.event.inputs.daily_limit || '20' }}" >> $GITHUB_ENV
          echo "Pipeline date: $PIPELINE_DATE"
          echo "AI limit: $AI_LIMIT"
          echo "Daily limit: $DAILY_LIMIT"

      - name: Run daily pipeline
        run: |
          npm run pipeline:daily -- \
            --date="$PIPELINE_DATE" \
            --ai-limit="$AI_LIMIT" \
            --daily-limit="$DAILY_LIMIT"
